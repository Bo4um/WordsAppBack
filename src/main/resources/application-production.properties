# Production Configuration

spring.application.name=WordsApp Back
spring.profiles.active=production

# OpenAI API Configuration
openai.api.key=${OPENAI_API_KEY}
openai.api.url=https://api.openai.com/v1/responses

# PostgreSQL Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/wordsapp}
spring.datasource.username=${DATABASE_USERNAME:wordsapp}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Redis Cache
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Server Configuration
server.port=${PORT:8080}
server.tomcat.max-threads=${MAX_THREADS:200}
server.tomcat.max-connections=${MAX_CONNECTIONS:8192}

# Actuator Endpoints (Production)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.info.enabled=true
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true

# Security for Actuator
management.security.enabled=true
management.endpoints.web.base-path=/actuator

# Logging (Production)
logging.level.com.bo4um.wordsappback=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# File Upload Limits
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# Pronunciation Storage
pronunciation.storage.path=${AUDIO_STORAGE_PATH:/var/wordsapp/audio}

# Rate Limiting
rate.limit.free.dialog=20
rate.limit.free.word=10
rate.limit.free.exercise=5

# Stripe Configuration (for Premium)
stripe.api.key=${STRIPE_API_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
stripe.price.id.premium=${STRIPE_PREMIUM_PRICE_ID}
