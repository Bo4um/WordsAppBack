# Test profile configuration
# Used for integration tests with Testcontainers

# These will be overridden by @DynamicPropertySource in AbstractIntegrationTest
# But we need to set them here to prevent Spring Boot from trying to use embedded DB
spring.datasource.url=jdbc:tc:postgresql:16-alpine:///testdb
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# Use Hibernate to create schema for tests (faster than Flyway)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.hbm2ddl.delimiter=;

# Disable H2 console for tests
spring.h2.console.enabled=false

# Disable Flyway for tests (Hibernate handles schema)
spring.flyway.enabled=false

# Redis for tests (optional - can use simple cache)
spring.cache.type=simple

# OpenAI - mock for tests
openai.api.url=http://localhost:8080/mock-openai
openai.api.key=test-key

# JWT for tests
jwt.secret=testSecretKeyForTestsMustBeLongEnoughForHS256
jwt.expiration=3600000

# Logging
logging.level.com.bo4um.wordsappback=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.testcontainers=INFO
logging.level.org.springframework.boot.autoconfigure=ERROR
logging.level.org.hibernate.SQL=DEBUG
