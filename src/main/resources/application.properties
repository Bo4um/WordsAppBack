spring.application.name=WordsApp Back
spring.profiles.active=dev

# OpenAI API Configuration
openai.api.key=${OPENAI_API_KEY:your-api-key-here}
openai.api.url=https://api.openai.com/v1/responses

# Logging
logging.level.com.bo4um.wordsappback=DEBUG
logging.level.org.springframework.security=DEBUG

# H2 Database Configuration (dev only)
spring.datasource.url=jdbc:h2:file:./data/wordsapp
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Cache (Caffeine for dev)
spring.cache.type=caffeine
spring.cache.cache-names=wordCache
spring.cache.time-to-live=3600000

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationMustBeLongEnoughForHS256Algorithm}
jwt.expiration=86400000
